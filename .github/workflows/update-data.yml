name: Actualizar datos oficiales (ETL)

on:
  schedule:
    - cron: '17 9 * * 1'   # cada lunes 09:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Descargar capas oficiales (SERNANP, OEFA)
        run: python etl/build_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "ETL: actualización automática de datos oficiales ($(date -u +%F))"
            git push
          fi
